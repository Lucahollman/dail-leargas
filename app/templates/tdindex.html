<html>
<head>
    <title>Dáil Léargas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='general.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='tdindex.css') }}">
</head>
<body>
    <header>
        <nav class="navbar">
            <ul>
                <li><a href="{{ url_for('home') }}" class="navtitle">Dáil Léargas</a></li>
                <li><a href="{{ url_for('overallstats') }}">Overall Statistics</a></li>
                <li><a href="{{ url_for('debates') }}">Debates</a></li>
                <li><a href="{{ url_for('tds') }}" class="active">Teachta Dála</a></li>
                <li><a href="{{ url_for('partyindex') }}">Parties</a></li>
                <li><a href="{{ url_for('words') }}">Words</a></li>
                <li><a href="{{ url_for('info') }}">Website Info</a></li>
            </ul>
        </nav>
    </header>
 
    <div class="pagebanner">
        <h2>Teachta Dála</h2>
    </div>
 
    <div class="contentwrapper">
        <div class="index-controls">
            <div class="index-search">
                <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.4"/>
                    <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                </svg>
                <input type="text" id="search-input" placeholder="Search by name, party, or constituency…" autocomplete="off">
            </div>
        </div>
 
        <div class="entries-meta"><span id="result-count"></span></div>
        <div class="entries-list" id="entries-list">
        {% for td in tds %}
            <div class="entry-row" data-search="{{ (td.name ~ ' ' ~ td.party ~ ' ' ~ td.constituency) | lower }}">
                <a href="{{ url_for('tdspecific', id=td.id) }}">{{ td.name }}</a>
                <span class="entry-leader"></span>
                <span class="entry-tag">{{ td.party }} · {{ td.constituency }}</span>
            </div>
        {% endfor %}
        </div>
    </div>
 
    <script src="{{ url_for('static', filename='tdindexsearch.js') }}"></script>
</body>
</html>
